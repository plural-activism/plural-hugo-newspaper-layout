baseURL = "https://example.org/"
languageCode = "en-us"
title = "Plural Newspaper Example Site"
theme = "plural-hugo-newspaper-layout"

[taxonomies]
  tag = "tags"
  category = "categories"

[params.colorScheme]
  default = "auto"
  enableHighContrast = true
  persistSelection = false

[params.listLayout]
  default = "list"
  allowUserOverride = true

[params.header]
  logoText = "Plural Newspaper"
  showSearch = false

[[params.footer.fixedLinks]]
  Name = "Accessibility statement"
  URL = "https://example.org/accessibility"

[[params.footer.fixedLinks]]
  Name = "Contact"
  URL = "https://example.org/contact"

[params.widgets]
  sidebar = ["toc", "social_links", "recent_posts", "category_posts", "fixed_links"]

[[params.social.links]]
  name = "Mastodon"
  url = "https://example.org/@plural"

[[params.social.links]]
  name = "GitHub"
  url = "https://github.com/plural-activism"

[params.social.share]
  enable = true
  networks = ["mastodon", "email"]

[params.posts]
  showReadingTime = true
  showTags = true
  showGlossary = true

[params.easyLanguage]
  section = "easy"
  showBadge = true

[[menus.main]]
  name = "Home"
  pageRef = "/"
  weight = 1

[[menus.main]]
  name = "Posts"
  pageRef = "/posts/"
  weight = 2

[[menus.main]]
  name = "Easy Language"
  pageRef = "/easy/"
  weight = 3

[[menus.footer]]
  name = "Imprint"
  url = "https://example.org/imprint"
  weight = 1
