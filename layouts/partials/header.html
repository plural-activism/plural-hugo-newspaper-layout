<header>
  <div><a href="{{ "/" | relLangURL }}">{{ .Site.Params.header.logoText | default .Site.Title }}</a></div>
  {{ partial "nav.html" . }}
  {{ with .Site.Params.header.fixedLinks }}
    <nav aria-label="Header fixed links">
      <ul>
        {{- range . -}}
          <li><a href="{{ .URL | safeURL }}">{{ .Name }}</a></li>
        {{- end -}}
      </ul>
    </nav>
  {{ end }}
</header>
