<!doctype html>
<html lang="{{ .Site.Language.LanguageCode | default .Site.LanguageCode | default `en` }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ block "title" . }}{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}{{ end }}</title>
    <style>
      .skip-link {
        left: 0;
        position: absolute;
        top: -9999px;
      }

      .skip-link:focus {
        background: #fff;
        border: 2px solid currentColor;
        left: 1rem;
        padding: 0.5rem 0.75rem;
        top: 1rem;
        z-index: 1000;
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to main content</a>
    {{ partial "header.html" . }}
    <main id="main-content" tabindex="-1">
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}
  </body>
</html>
